name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Run test-health
        run: bash scripts/test-health.sh
      - name: Check whitespace
        run: git diff --check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-check]
    strategy:
      matrix:
        package: [protocol, storage, core, sdk]
        app: [server, tui]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Typecheck packages/${{ matrix.package }}
        run: cd packages/${{ matrix.package }} && bun run typecheck
      - name: Typecheck apps/${{ matrix.app }}
        run: cd apps/${{ matrix.app }} && bun run typecheck

  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-check]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
      - name: Run e2e tests
        run: bun run test:e2e
