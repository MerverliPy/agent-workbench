<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
    <meta name="theme-color" content="#141418" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f7fa" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Mobile companion for agent-workbench — touch-optimized chat + panels" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236363f0'/><path d='M11 16c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5a4.98 4.98 0 0 1-2.93-.93l-2.24.93.93-2.24A4.98 4.98 0 0 1 11 16' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round'/></svg>">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agent WB" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme init — prevent FOUC -->
    <script>
      (() => {
        var saved = localStorage.getItem('agent-workbench-theme');
        if (saved === 'dark') document.documentElement.classList.add('dark');
        else if (saved === 'light') document.documentElement.classList.add('light');
        // auto: no class — respects prefers-color-scheme via CSS
      })();
    </script>

    <!-- iOS Safari keyboard avoidance — use visualViewport API to keep composer visible -->
    <script>
      (() => {
        if (!window.visualViewport) return;
        // Capture the full layout height before any keyboard interaction
        var fullHeight = window.innerHeight;
        var restoreKeyboard = () => {
          var vvHeight = window.visualViewport.height;
          var vvOffsetTop = window.visualViewport.offsetTop;
          // Update full height when keyboard is not open (orientation changes etc.)
          var keyboardHeight = Math.max(0, window.innerHeight - vvOffsetTop - vvHeight);
          var html = document.documentElement;
          if (keyboardHeight > 80) {
            // Keyboard is open — constrain the shell to the visual viewport height
            html.style.setProperty('--kb-height', keyboardHeight + 'px');
            html.style.setProperty('--vh', vvHeight + 'px');
            html.classList.add('keyboard-open');
          } else {
            // Keyboard is closed — restore normal sizing
            html.style.removeProperty('--kb-height');
            html.style.removeProperty('--vh');
            html.classList.remove('keyboard-open');
          }
        };
        window.visualViewport.addEventListener('resize', restoreKeyboard);
        window.visualViewport.addEventListener('scroll', () => {
          restoreKeyboard();
          // iOS Safari scrolls the body when the keyboard opens — snap back
          if (window.scrollY !== 0) window.scrollTo(0, 0);
        });
        window.addEventListener('orientationchange', () => {
          // Re-capture full height after orientation settles
          setTimeout(() => {
            fullHeight = window.innerHeight;
            restoreKeyboard();
          }, 400);
        });
      })();
    </script>

    <title>Agent WB</title>
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased overscroll-none">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
