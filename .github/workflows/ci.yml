name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Run test-health
        run: bash scripts/test-health.sh
      - name: Check whitespace
        run: git diff --check

  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [static-check]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Typecheck packages
        run: |
          for pkg in protocol models events sdk storage core permissions tools shell diff tokens cache planner; do
            echo "  [typecheck] packages/$pkg"
            (cd packages/$pkg && bun run typecheck) || exit 1
          done
      - name: Typecheck apps
        run: |
          for app in server tui; do
            echo "  [typecheck] apps/$app"
            (cd apps/$app && bun run typecheck) || exit 1
          done
      - name: Run tests
        run: bun test
      - name: Run e2e tests
        run: bun run test:e2e
