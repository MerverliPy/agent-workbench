name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Run test-health
        run: bash scripts/test-health.sh
      - name: Check whitespace
        run: git diff --check
      - name: Biome lint
        run: bunx @biomejs/biome check . --no-errors-on-unmatched 2>&1 || echo "::warning::Biome lint found issues or not available"

  typecheck:
    name: Typecheck all packages + apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-check]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Typecheck packages
        run: |
          for pkg in protocol models events sdk storage core permissions tools shell diff tokens cache planner config ui auth collab; do
            echo "  [typecheck] packages/$pkg"
            (cd packages/$pkg && bun run typecheck) || exit 1
          done
      - name: Typecheck apps
        run: |
          for app in server tui cli mobile-web dashboard; do
            echo "  [typecheck] apps/$app"
            (cd apps/$app && bun run typecheck) || exit 1
          done

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Run tests
        run: bun test

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Generate coverage report
        run: bun test --coverage

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Run e2e tests
        run: bun run test:e2e
