name: Repo Health

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Repo inventory
        run: |
          find . -maxdepth 3 -type f | sort | sed 's#^\./##' | head -300

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Bun checks
        if: hashFiles('bun.lock') != ''
        run: |
          bun install --frozen-lockfile
          bun run --if-present typecheck
          bun test --if-present
          bun run build --if-present

      - name: Python checks
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m compileall .

      - name: Go checks
        if: hashFiles('go.mod') != ''
        run: |
          go mod download
          go test ./...
