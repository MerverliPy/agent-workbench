name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

env:
  BUN_VERSION: "1.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Cache bun install + dist
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/dist
            **/.tsbuildinfo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Run test-health
        run: bash scripts/test-health.sh
      - name: Check whitespace
        run: git diff --check
      - name: Biome lint
        run: bunx @biomejs/biome check . --skip-parse-errors --no-errors-on-unmatched 2>&1

  typecheck:
    name: Typecheck all packages + apps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-check]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Cache bun install + dist
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/dist
            **/.tsbuildinfo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Verify lockfile integrity
        run: bun install --frozen-lockfile
      - name: Typecheck packages
        run: |
          for pkg in protocol models events sdk storage core permissions tools shell diff tokens cache planner config ui auth collab eval plugin-sdk telemetry; do
            echo "  [typecheck] packages/$pkg"
            (cd packages/$pkg && bun run typecheck) || exit 1
          done
      - name: Typecheck plugins
        run: |
          for plugin in agent-workbench-hermes; do
            echo "  [typecheck] plugins/$plugin"
            (cd plugins/$plugin && bun run typecheck) || exit 1
          done
      - name: Typecheck apps
        run: |
          for app in server tui cli mobile-web dashboard; do
            echo "  [typecheck] apps/$app"
            (cd apps/$app && bun run typecheck) || exit 1
          done

  test:
    name: Unit + integration tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [typecheck]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Cache bun install + dist
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/dist
            **/.tsbuildinfo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Run tests with coverage
        run: bun test --coverage
      - name: Run orphan tests (outside tests/ workspace)
        run: |
          for dir in apps/server apps/mobile-web packages/compliance packages/auth plugins/agent-workbench-opencode; do
            if [ -d "$dir" ]; then
              echo "  [test] $dir"
              (cd "$dir" && bun run test 2>&1) || echo "⚠️ Tests in $dir had failures (non-blocking)"
            fi
          done
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Cache bun install + dist
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/dist
            **/.tsbuildinfo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Build workspace packages
        run: bash scripts/build-all.sh
      - name: Run e2e tests
        run: bun run test:e2e
