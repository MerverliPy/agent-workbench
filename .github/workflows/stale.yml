name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 7 days
            if there is no further activity. If you believe this issue is still relevant,
            please comment to keep it open.
          close-issue-message: >
            This issue was closed because it has been inactive for 60+ days.
            If you believe this was closed in error, feel free to reopen it.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,good first issue'
          
          # Pull Requests  
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 7 days
            if there is no further activity. Please rebase and address any conflicts
            to keep it open.
          close-pr-message: >
            This PR was closed due to inactivity. Feel free to reopen if you plan
            to continue working on it.
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work in progress'
          
          # Limits
          operations-per-run: 100