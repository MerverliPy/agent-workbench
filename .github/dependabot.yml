# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
    groups:
      typescript:
        patterns:
          - "typescript"
      dev-dependencies:
        dependency-type: "development"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # Workspace packages with external dependencies
  - package-ecosystem: "npm"
    directory: "/tests"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      test-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "tests"

  - package-ecosystem: "npm"
    directory: "/apps/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      server-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "server"

  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      dashboard-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dashboard"

  - package-ecosystem: "npm"
    directory: "/apps/mobile-web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      mobile-web-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile-web"

  - package-ecosystem: "npm"
    directory: "/apps/tui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      tui-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "tui"

  - package-ecosystem: "npm"
    directories:
      - "/packages/storage"
      - "/packages/protocol"
      - "/packages/sdk"
      - "/packages/tools"
      - "/packages/eval"
      - "/packages/auth"
      - "/packages/diff"
      - "/packages/plugin-sdk"
      - "/packages/collab"
      - "/packages/core"
      - "/packages/permissions"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    groups:
      packages-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "packages"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
